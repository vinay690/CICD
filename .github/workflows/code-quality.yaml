name: My CI Pipeline

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop, release/*]
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run linting
        run: npm run lint

      - name: code coverage
        run: npm run test:coverage

      - name: upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

